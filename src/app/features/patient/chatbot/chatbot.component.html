<div class="nav-arrow" (click)="navigateToHome()" title="Go to Home">
  <i class="fa-solid fa-arrow-left"></i>
</div>

<section class="chatbot-page">
  <div class="chat-wrapper">

    <div class="sidebar">
      <div class="sidebar-top">
        <button class="sidebar-btn new-chat-btn" (click)="startNewChat()">
          <i class="fa-regular fa-pen-to-square"></i>
          <span>New chat</span>
        </button>

        <button class="sidebar-btn" (click)="searchChats()">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span>Search chats</span>
        </button>
      </div>

      <div class="sidebar-divider"></div>

      <div class="recent-chats">
        <h3 class="recent-label">Recents</h3>
        <div class="chat-list">
          <div *ngIf="isLoadingHistory" class="loading-chat-list">
            <p>Loading history...</p>
          </div>
          
          <div *ngIf="!isLoadingHistory && recentChats.length === 0" class="empty-chat-list">
            <p>No recent chats</p>
          </div>
          
          <div
            *ngFor="let chat of recentChats.slice(0, 8); trackBy: trackByChat"
            class="chat-item"
            (click)="loadChat(chat)"
            [class.active]="chat.id === currentChatSessionId"
            [title]="chat.userSymptom || 'Chat'"
          >
            <span>{{ chat.title }}</span>
            <small class="chat-date" *ngIf="chat.timestamp">
              {{ (chat.timestamp | date:'shortTime') }}
            </small>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-container">

      <div class="chat-messages" #chatMessages [class.has-messages]="messages.length > 0">

        <div *ngIf="messages.length === 0" class="welcome-message">
          <h2>What's on your mind today?</h2>
        </div>

        <div *ngFor="let message of messages; trackBy: trackByMessage" class="message-wrapper">
          <div class="message" [class.user-message]="message.sender === 'user'" [class.bot-message]="message.sender === 'bot'">
            <div *ngIf="message.sender === 'bot'" class="message-avatar bot-avatar">
              <i class="fa-solid fa-robot"></i>
            </div>
            <div class="message-content">
              <div class="message-text">{{ message.text }}</div>
              <div class="message-time">{{ formatTime(message.timestamp) }}</div>
            </div>
          </div>
        </div>

        <div *ngIf="isTyping" class="typing-indicator">
          <div class="typing-avatar">
            <i class="fa-solid fa-robot"></i>
          </div>
          <div class="typing-content">
            <div class="typing-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span class="typing-text">Medical Assistant is typing...</span>
          </div>
        </div>
      </div>

      <div class="chat-input-container">
        <div class="input-box">
          <input
            type="text"
            class="chat-input"
            placeholder="Ask anything"
            [(ngModel)]="userInput"
            (keydown)="onEnterKey($event)"
            [disabled]="isTyping"
          >

          <button
            class="send-button"
            [disabled]="!userInput.trim() || isTyping"
            (click)="sendMessage()"
            title="Send message"
          >
            <i class="fa-solid fa-arrow-up"></i>
          </button>
        </div>
      </div>
    </div>

  </div>
</section>
