<app-navbar></app-navbar>

<section class="clinic-details-page">
  <div class="page-container">
    <a routerLink="/home-for-patient" class="back-link">
      <i class="bi bi-arrow-left" aria-hidden="true"></i>
      <span>Back to Home</span>
    </a>

    <header class="clinic-header">
      <div class="clinic-header__main">
        <div class="clinic-header__titles">
          <h1>{{ clinicName }}</h1>
          <p class="clinic-header__doctor">
            <i class="bi bi-person-badge" aria-hidden="true"></i>
            {{ doctorName }}
          </p>
        </div>
        <span class="verified-badge">
          <i class="bi bi-patch-check-fill" aria-hidden="true"></i>
          Verified
        </span>
      </div>
    </header>

    <div class="clinic-layout">
      <main class="clinic-main">
        <section class="services-panel" aria-labelledby="services-heading">
          <div class="services-panel__head">
            <h2 id="services-heading">Available Services</h2>
            <p class="services-panel__hint">Choose a service to continue booking.</p>
          </div>

          <ul class="services-list">
            <li class="service-row" *ngFor="let s of services">
              <div class="service-row__body">
                <div class="service-row__name-block">
                  <span class="service-row__icon" aria-hidden="true">
                    <i class="bi bi-heart-pulse"></i>
                  </span>
                  <div>
                    <h3 class="service-row__name">{{ s.name }}</h3>
                    <p class="service-row__duration">
                      <i class="bi bi-clock" aria-hidden="true"></i>
                      {{ s.durationMins }} mins
                    </p>
                  </div>
                </div>
                <div class="service-row__meta">
                  <div class="service-row__price">
                    <i class="bi bi-tag" aria-hidden="true"></i>
                    <span class="service-row__price-value">{{ s.priceEgp | number }}</span>
                    <span class="service-row__price-currency">EGP</span>
                  </div>
                  <button type="button" class="service-row__cta" (click)="selectService(s)">
                    Book
                    <i class="bi bi-arrow-right-short" aria-hidden="true"></i>
                  </button>
                </div>
              </div>
            </li>
          </ul>
        </section>
      </main>

      <aside class="clinic-sidebar" aria-label="Clinic information">
        <div class="sidebar-card">
          <h3 class="sidebar-card__title">
            <i class="bi bi-info-circle" aria-hidden="true"></i>
            Clinic info
          </h3>

          <div class="sidebar-block">
            <span class="sidebar-block__label">
              <i class="bi bi-geo-alt" aria-hidden="true"></i>
              Address
            </span>
            <p class="sidebar-block__text">{{ address }}</p>
          </div>

          <div class="sidebar-block">
            <span class="sidebar-block__label">
              <i class="bi bi-clock-history" aria-hidden="true"></i>
              Opening hours
            </span>
            <p class="sidebar-block__text sidebar-block__text--pre">{{ openingHours }}</p>
          </div>

          <div class="map-placeholder" role="img" aria-label="Map preview placeholder">
            <i class="bi bi-map" aria-hidden="true"></i>
            <span>Map preview</span>
          </div>
        </div>
      </aside>
    </div>
  </div>
</section>

<app-footer></app-footer>
